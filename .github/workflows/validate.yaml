name: "Validate"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"

      - name: "HACS Action"
        uses: "hacs/action@main"
        with:
          category: "integration"
