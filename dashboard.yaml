# Kampklar-dashboard.
#
# Brug: Settings → Dashboards → "Add Dashboard" → "New dashboard from scratch"
# → tre prikker → "Raw configuration editor" → indsæt indholdet herunder.
#
# Forventede entity-IDs (baseret på fornavn fra mit.dbu.dk's "Kontaktperson"):
#   sensor.kampklar_beskeder
#   sensor.kampklar_josva_naeste_aktivitet
#   sensor.kampklar_josva_kommende_aktiviteter
#   sensor.kampklar_josva_mangler_tilmelding
#   calendar.kampklar_josva_aktiviteter
#
# For flere børn: dupliker view-sektionen og udskift "josva" med næste navn.

title: Kampklar
views:
  - title: Josva
    icon: mdi:soccer
    cards:
      # ---- Top-række: hurtige tal ----
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.kampklar_josva_naeste_aktivitet
            name: Næste aktivitet
            icon: mdi:soccer-field
          - type: entity
            entity: sensor.kampklar_josva_mangler_tilmelding
            name: Mangler svar
            icon: mdi:account-question
          - type: entity
            entity: sensor.kampklar_beskeder
            name: Beskeder
            icon: mdi:email

      # ---- Næste aktivitet i detalje ----
      - type: markdown
        title: Næste aktivitet
        content: |
          {% set s = states('sensor.kampklar_josva_naeste_aktivitet') %}
          {% if s in ['unknown','unavailable','none', None] %}
          _Ingen kommende aktiviteter_
          {% else %}
          ### {{ state_attr('sensor.kampklar_josva_naeste_aktivitet','title') }}
          🗓️ {{ as_timestamp(s) | timestamp_custom('%A %d-%m-%Y kl. %H:%M') }}
          {% if state_attr('sensor.kampklar_josva_naeste_aktivitet','location') %}
          📍 {{ state_attr('sensor.kampklar_josva_naeste_aktivitet','location') }}
          {% endif %}
          {% if state_attr('sensor.kampklar_josva_naeste_aktivitet','type') %}
          🏷️ {{ state_attr('sensor.kampklar_josva_naeste_aktivitet','type') }}
          {% endif %}
          {% if state_attr('sensor.kampklar_josva_naeste_aktivitet','signup_status') %}
          ✅ Status: **{{ state_attr('sensor.kampklar_josva_naeste_aktivitet','signup_status') }}**
          {% endif %}
          _{{ state_attr('sensor.kampklar_josva_naeste_aktivitet','team') }}_
          {% endif %}

      # ---- Kalender (NB: state=off er normalt; den viser kun "on" når en
      # begivenhed kører lige nu. Listen er i kortet nedenfor.)
      - type: calendar
        entities:
          - calendar.kampklar_josva_aktiviteter
        initial_view: listWeek
        title: Kalender

      # ---- Alle kommende aktiviteter ----
      - type: markdown
        title: Kommende aktiviteter
        content: |
          {% set acts = state_attr('sensor.kampklar_josva_kommende_aktiviteter','activities') or [] %}
          {% if acts|length == 0 %}
          _Ingen kommende aktiviteter_
          {% else %}
          {% for a in acts %}
          **{{ a.title }}** {% if a.type %}· _{{ a.type }}_{% endif %}
          🗓️ {{ a.weekday or '' }} {{ a.date }}{% if a.time %} · kl. {{ a.time }}{% endif %}
          {% if a.location %}📍 {{ a.location }}{% endif %}
          {% if a.signup_status %}✅ **{{ a.signup_status }}**{% if a.signup_locked %} (lukket){% endif %}{% endif %}

          ---
          {% endfor %}
          {% endif %}

      # ---- Aktiviteter der mangler tilmelding ----
      - type: markdown
        title: Mangler tilmelding
        content: |
          {% set acts = state_attr('sensor.kampklar_josva_mangler_tilmelding','activities') or [] %}
          {% if acts|length == 0 %}
          _Alt er besvaret_ ✅
          {% else %}
          {% for a in acts %}
          - **{{ a.title }}** — {{ a.date }} {{ a.time or '' }}
            {%- if a.location %} · {{ a.location }}{% endif %}
          {% endfor %}
          {% endif %}

      # ---- Seneste 10 beskeder med fuld body ----
      # Hver besked er en <details>-blok — klik på subject for at folde ud.
      # "Åbn på dbu.dk" linker til den originale besked.
      - type: markdown
        title: Seneste beskeder
        content: |
          {% set msgs = state_attr('sensor.kampklar_beskeder','messages') or [] %}
          {% if msgs|length == 0 %}
          _Ingen beskeder_
          {% else %}
          {% for m in msgs %}
          <details>
          <summary><b>{{ m.subject }}</b> — <i>{{ m.sender }}</i><br>
          <small>{{ as_timestamp(m.received) | timestamp_custom('%d-%m-%Y %H:%M') }}{% if m.category %} · {{ m.category }}{% endif %} · <a href="{{ m.url }}" target="_blank">Åbn på dbu.dk</a></small></summary>

          {{ m.body | replace('\n','<br>') }}

          </details>

          ---
          {% endfor %}
          {% endif %}
